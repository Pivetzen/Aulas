<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle - Reforço Escolar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .progress-bar { transition: width 1s ease-in-out; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8 font-sans">

    <div class="max-w-5xl mx-auto">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4 bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Portal de Reforço</h1>
                <p class="text-slate-500">Acompanhamento pedagógico em tempo real</p>
            </div>
            
            <div class="flex items-center bg-slate-50 px-4 py-2 rounded-xl border border-slate-200">
                <label class="mr-3 font-semibold text-slate-600 uppercase text-xs tracking-wider">Selecionar Aluno:</label>
                <select id="select-aluno" onchange="renderizarDados()" class="bg-transparent border-none focus:ring-0 text-blue-600 font-bold cursor-pointer text-lg">
                    <option value="João Silva">João Silva</option>
                    <option value="Maria Souza">Maria Souza</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                    <div class="flex items-center mb-6">
                        <div class="w-2 h-6 bg-blue-500 rounded-full mr-3"></div>
                        <h2 class="text-xl font-bold text-gray-800">Evolução</h2>
                    </div>
                    <div id="container-progresso" class="space-y-6">
                        </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                    <div class="flex items-center mb-6">
                        <div class="w-2 h-6 bg-green-500 rounded-full mr-3"></div>
                        <h2 class="text-xl font-bold text-gray-800">Histórico de Aulas</h2>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-slate-400 text-xs uppercase tracking-widest border-b border-slate-100">
                                    <th class="py-4 px-2">Data</th>
                                    <th class="py-4 px-2">Conteúdo</th>
                                    <th class="py-4 px-2 text-center">Horas</th>
                                    <th class="py-4 px-2 text-right">Financeiro</th>
                                </tr>
                            </thead>
                            <tbody id="tabela-aulas" class="text-slate-600 divide-y divide-slate-50">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // SUBSTITUA PELO SEU LINK CSV PUBLICADO
        const URL_PLANILHA = 'COLE_SEU_LINK_AQUI';

        async function carregarTudo() {
            try {
                const response = await fetch(URL_PLANILHA);
                const csvText = await response.text();
                return processarCSV(csvText);
            } catch (e) {
                console.error("Erro:", e);
                return [];
            }
        }

        function processarCSV(texto) {
            const linhas = texto.split('\n').slice(1);
            return linhas.map(l => {
                const c = l.split(',');
                return {
                    tipo: c[0]?.trim(),
                    conteudo: c[1]?.trim(),
                    valor: c[2]?.trim(),
                    extra: c[3]?.trim(),
                    pago: c[4]?.trim()?.toLowerCase() === 'sim',
                    aluno: c[5]?.trim()
                };
            });
        }

        async function renderizarDados() {
            const listaOriginal = await carregarTudo();
            const selecionado = document.getElementById('select-aluno').value;
            
            const cProgresso = document.getElementById('container-progresso');
            const tAulas = document.getElementById('tabela-aulas');

            cProgresso.innerHTML = '';
            tAulas.innerHTML = '';

            // Filtrar dados do aluno selecionado
            const dadosAluno = listaOriginal.filter(d => d.aluno === selecionado);

            // Renderizar Progressos
            dadosAluno.filter(d => d.tipo === 'Progresso').forEach(i => {
                const p = parseInt(i.valor) || 0;
                cProgresso.innerHTML += `
                    <div>
                        <div class="flex justify-between text-sm mb-2">
                            <span class="font-semibold text-slate-700">${i.conteudo}</span>
                            <span class="text-blue-600 font-bold">${p}%</span>
                        </div>
                        <div class="w-full bg-slate-100 rounded-full h-3 overflow-hidden">
                            <div class="bg-blue-500 h-3 rounded-full progress-bar" style="width: ${p}%"></div>
                        </div>
                    </div>
                `;
            });

            // Renderizar Aulas
            dadosAluno.filter(d => d.tipo === 'Aula').forEach(i => {
                tAulas.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="py-4 px-2 text-sm text-slate-500">${i.valor}</td>
                        <td class="py-4 px-2 font-semibold text-slate-800">${i.conteudo}</td>
                        <td class="py-4 px-2 text-center text-sm font-medium text-slate-600">${i.extra}h</td>
                        <td class="py-4 px-2 text-right">
                            <span class="inline-block px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter ${i.pago ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                                ${i.pago ? 'Pago' : 'Pendente'}
                            </span>
                        </td>
                    </tr>
                `;
            });
        }

        renderizarDados();
    </script>
</body>
</html>
