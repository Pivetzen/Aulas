<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Professor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>.progress-bar { transition: width 1s ease-in-out; }</style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8 font-sans">
    <div class="max-w-5xl mx-auto">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4 bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Portal de Reforço</h1>
                <p class="text-slate-500 text-sm">Atualizado em tempo real</p>
            </div>
            <div class="flex items-center bg-slate-50 px-4 py-2 rounded-xl border border-slate-200">
                <label class="mr-3 font-semibold text-slate-600 uppercase text-xs">Aluno:</label>
                <select id="select-aluno" onchange="renderizarDados()" class="bg-transparent border-none focus:ring-0 text-blue-600 font-bold cursor-pointer text-lg">
                    <option value="">Carregando...</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                    <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center"><span class="w-2 h-6 bg-blue-500 rounded mr-2"></span>Evolução</h2>
                    <div id="container-progresso" class="space-y-6"></div>
                </div>
            </div>
            <div class="lg:col-span-2">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                    <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center"><span class="w-2 h-6 bg-green-500 rounded mr-2"></span>Histórico de Aulas</h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm text-slate-600">
                            <thead>
                                <tr class="text-slate-400 uppercase text-[10px] tracking-widest border-b">
                                    <th class="py-4">Data</th>
                                    <th class="py-4">Conteúdo</th>
                                    <th class="py-4 text-center">Horas</th>
                                    <th class="py-4 text-right">Status</th>
                                </tr>
                            </thead>
                            <tbody id="tabela-aulas" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const URL_BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRh5bjSs9NewAv_-WBTzeeSXHGsq-m1yQD_952R8Jppd3wCqJrTXogh_7tt87o1EmW1f2Y5d61dUFB5/pub?output=csv'; // Substitua pelo seu link
        let dadosGlobais = [];

        async function carregarDados() {
            try {
                // Adiciona um parâmetro de tempo para evitar o cache (força atualização)
                const cacheBuster = `&t=${new Date().getTime()}`;
                const response = await fetch(URL_BASE + cacheBuster);
                const csvText = await response.text();
                
                const linhas = csvText.split('\n').slice(1);
                dadosGlobais = linhas.map(l => {
                    const c = l.split(',');
                    return {
                        tipo: c[0]?.trim(),
                        conteudo: c[1]?.trim(),
                        valor: c[2]?.trim(),
                        extra: c[3]?.trim(),
                        pago: c[4]?.trim()?.toLowerCase() === 'sim',
                        aluno: c[5]?.trim()
                    };
                }).filter(item => item.aluno);

                popularMenuAlunos();
                renderizarDados();
            } catch (e) { console.error("Erro ao carregar:", e); }
        }

        function popularMenuAlunos() {
            const select = document.getElementById('select-aluno');
            const alunosUnicos = [...new Set(dadosGlobais.map(d => d.aluno))];
            const valorAtual = select.value;
            
            select.innerHTML = alunosUnicos.map(nome => 
                `<option value="${nome}" ${nome === valorAtual ? 'selected' : ''}>${nome}</option>`
            ).join('');
            
            if (!valorAtual && alunosUnicos.length > 0) select.value = alunosUnicos[0];
        }

        function renderizarDados() {
            const selecionado = document.getElementById('select-aluno').value;
            const cProgresso = document.getElementById('container-progresso');
            const tAulas = document.getElementById('tabela-aulas');

            cProgresso.innerHTML = ''; tAulas.innerHTML = '';
            const dadosFiltrados = dadosGlobais.filter(d => d.aluno === selecionado);

            dadosFiltrados.forEach(i => {
                if (i.tipo === 'Progresso') {
                    const p = parseInt(i.valor) || 0;
                    cProgresso.innerHTML += `<div><div class="flex justify-between text-xs mb-1 font-bold text-slate-700"><span>${i.conteudo}</span><span>${p}%</span></div>
                    <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden"><div class="bg-blue-500 h-2 progress-bar" style="width:${p}%"></div></div></div>`;
                } else if (i.tipo === 'Aula') {
                    tAulas.innerHTML += `<tr class="hover:bg-slate-50"><td class="py-4 text-slate-400">${i.valor}</td><td class="py-4 font-semibold text-slate-800">${i.conteudo}</td>
                    <td class="py-4 text-center">${i.extra}h</td><td class="py-4 text-right"><span class="px-2 py-1 rounded-full text-[10px] font-black uppercase ${i.pago ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${i.pago ? 'Pago' : 'Pendente'}</span></td></tr>`;
                }
            });
        }

        carregarDados();
        // Recarrega automaticamente a cada 2 minutos enquanto a página estiver aberta
        setInterval(carregarDados, 120000);
    </script>
</body>
</html>
